# CI workflow: on every push to main, rebuild the index and deploy to GitHub Pages.
# Requires repo Settings → Pages → Source = "GitHub Actions" (one-time).
name: Build & deploy cheat sheets

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # also allow manual runs from the Actions tab

# Least-privilege permissions for the Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate index + assemble site
        run: python scripts/build_index.py
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
